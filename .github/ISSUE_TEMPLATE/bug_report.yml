name: Bug report
description: Report a reproducible bug in Archon Professional, Academy, CLI, or portal
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Include steps to reproduce and your environment.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Professional (frontend)
        - Academy
        - Backend API
        - archon-cli
        - Portal (archonpro.net)
        - Docker / install.py
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: e.g. 1.0.0 or git sha
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. … 2. … 3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant console or docker compose logs

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
        - Other
