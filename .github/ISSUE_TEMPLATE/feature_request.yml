name: Feature request
description: Suggest an enhancement aligned with the roadmap
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [ROADMAP.md](https://github.com/Sking-4242/archonv1/blob/master/ROADMAP.md) and [CONTRIBUTING.md](https://github.com/Sking-4242/archonv1/blob/master/CONTRIBUTING.md) before filing.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is painful today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Canvas / components
        - Validation
        - Terraform import/export
        - Discovery
        - FinOps
        - Academy
        - CLI / GitOps
        - Portal / licensing
        - Other
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Scope acknowledgment
      options:
        - label: I read CONTRIBUTING.md and this is not listed as out of scope
          required: true
