name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Frontend — lint ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  academy:
    name: Academy lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: academy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: academy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  archon-cli:
    name: archon-cli test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: archon-cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: archon-cli/pyproject.toml

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Pytest
        run: pytest tests/ -q

  gitops:
    name: GitOps workflow smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: archon-cli/pyproject.toml

      - name: Install archon-cli
        run: pip install -e "./archon-cli"

      - name: Validate sample plan (github format)
        run: |
          set +e
          archon-cli validate archon-cli/sample_plan.json --format github -o validate-report.md
          code=$?
          test -s validate-report.md
          grep -q "Archon Validation" validate-report.md
          test "$code" -eq 1

      - name: Cost sample plan (github format)
        run: |
          archon-cli cost archon-cli/sample_plan.json --format github -o cost-report.md
          test -s cost-report.md
          grep -q "Archon Cost Impact" cost-report.md

  portal:
    name: Portal build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: portal/package.json

      - name: Install dependencies
        run: npm install

      - name: Production build
        run: npm run build

  # ── Backend — lint + test ────────────────────────────────────────────────────
  backend:
    name: Backend lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./test.db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app/

      - name: Black format check
        run: black --check app/

      - name: Pytest
        run: pytest
