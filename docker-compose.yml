services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-archon_academy}
      - POSTGRES_USER=${POSTGRES_USER:-archon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-archon_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archon} -d ${POSTGRES_DB:-archon_academy}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - XAI_BASE_URL=${XAI_BASE_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - ACADEMY_PORT=${ACADEMY_PORT:-3001}
      - DATABASE_URL=${DATABASE_URL:-postgresql://archon:archon_dev@db:5432/archon_academy}
      - ACADEMY_SECRET_KEY=${ACADEMY_SECRET_KEY:-change-me-for-production}
      - CONTENT_ROOT=/app/content
      - ARCHONPRO_PORTAL_URL=${ARCHONPRO_PORTAL_URL:-http://localhost:3002}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-console}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@archonpro.net}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_dev_test_secret}
      - STRIPE_PRICE_INDIVIDUAL_MONTHLY=${STRIPE_PRICE_INDIVIDUAL_MONTHLY:-}
      - STRIPE_PRICE_INSTITUTIONAL=${STRIPE_PRICE_INSTITUTIONAL:-}
      - ARCHON_OPEN_ACCESS=${ARCHON_OPEN_ACCESS:-true}
      - DEV_UNLOCK_ALL=${DEV_UNLOCK_ALL:-true}
    volumes:
      - ./academy/content:/app/content:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - VITE_API_URL=
      - BACKEND_URL=http://backend:8000
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
    depends_on:
      - backend
    restart: unless-stopped

  academy:
    build:
      context: ./academy
      dockerfile: Dockerfile
    ports:
      - "${ACADEMY_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
      - ACADEMY_PORT=${ACADEMY_PORT:-3001}
    depends_on:
      - backend
    restart: unless-stopped

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    ports:
      - "${PORTAL_PORT:-3002}:3002"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
      - PORTAL_PORT=${PORTAL_PORT:-3002}
    depends_on:
      - backend
    restart: unless-stopped

  license-cron:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://archon:archon_dev@db:5432/archon_academy}
      - SKIP_SEEDS=true
    command: ["python", "cron_license.py", "--loop"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
